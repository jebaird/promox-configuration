# Grafana Dashboard Provisioning
# Auto-loads dashboards from /var/lib/grafana/dashboards

apiVersion: 1

providers:
  - name: 'Proxmox'
    orgId: 1
    folder: 'Proxmox'
    folderUid: 'proxmox'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
