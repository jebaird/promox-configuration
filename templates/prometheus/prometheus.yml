# Prometheus Configuration
# Generated by proxmox-config monitoring deployment

global:
  scrape_interval: {{SCRAPE_INTERVAL}}
  evaluation_interval: {{SCRAPE_INTERVAL}}
  
  external_labels:
    monitor: 'proxmox-homelab'

# Alertmanager configuration (optional, for future use)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Rule files (optional, for future use)
# rule_files:
#   - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # PVE Exporter - Proxmox VE metrics
  - job_name: 'pve'
    static_configs:
      - targets: ['localhost:9221']
        labels:
          instance: 'pve'
    metrics_path: /pve
    params:
      module: [default]
      target: [{{PVE_HOST}}]
    relabel_configs:
      - source_labels: [__param_target]
        target_label: pve_host
      - source_labels: [__address__]
        target_label: __param_target
        replacement: {{PVE_HOST}}

  # Node exporter (if installed on Proxmox host)
  # Uncomment to enable host-level metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['{{PVE_HOST}}:9100']
  #       labels:
  #         instance: 'pve-host'
