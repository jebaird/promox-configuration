# Proxmox VE Test Instance Connection Configuration
# ==================================================
# Default configuration for the local QEMU-in-Docker test instance.
#
# The actual connection settings are controlled via environment variables
# in test/.env, which override these defaults. This allows testing against
# different Proxmox servers without modifying this file.
#
# Environment variable overrides:
#   PROXMOX_HOST - Proxmox server IP/hostname
#   PROXMOX_PORT - API port (default: 8006)
#   PROXMOX_NODE - Node name (default: pve)

# Placeholder defaults - overridden by PROXMOX_HOST in test/.env
host: "localhost"
port: 8006
node: "pve"
verify_ssl: false

# Timeouts – the QEMU-backed instance may be slower than bare-metal
connection_timeout: 60
read_timeout: 600
