# Docker Compose configuration for running a local Proxmox VE 9.1 test instance.
#
# This uses QEMU-in-Docker to boot a full Proxmox VE 9.1 installation inside a
# container, providing a real Proxmox API endpoint for integration testing.
#
# Prerequisites:
#   - Docker with KVM support (/dev/kvm available on the host)
#   - At least 6 GB of free RAM and 40 GB of free disk space
#
# Usage:
#   # Start the Proxmox VE test instance
#   docker compose -f docker-compose.test.yaml up -d proxmox
#
#   # Wait for Proxmox to finish booting (check health or logs)
#   docker compose -f docker-compose.test.yaml logs -f proxmox
#
#   # Run proxmox-config commands against the test instance
#   docker compose -f docker-compose.test.yaml run --rm proxmox-config test
#
#   # Tear down the test environment
#   docker compose -f docker-compose.test.yaml down
#
#   # Tear down and remove persistent data
#   docker compose -f docker-compose.test.yaml down -v

services:
  proxmox:
    image: qemux/qemu
    container_name: proxmox-test
    environment:
      BOOT: "http://download.proxmox.com/iso/proxmox-ve_9.1-1.iso"
      # Simulate typical home lab hardware (Dell Optiplex i7-5xxx, 32GB upgraded)
      # Adjust RAM_SIZE based on your available memory (leave ~2GB for host)
      RAM_SIZE: "12G"      # 12GB - safe for 16GB systems
      CPU_CORES: "4"       # 4 cores - i7-5xxx has 4c/8t
      DISK_SIZE: "128G"    # 128GB - room for pfSense + monitoring stack
      PORTS: "8007:8006/tcp"
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "8007:8007"
      - "3000:3000"   # Grafana (forwarded via iptables to LXC)
      - "9090:9090"   # Prometheus (forwarded via iptables to LXC)
      - "2222:2222"   # Cert-manager SSH (forwarded via iptables to LXC)
    volumes:
      - proxmox-storage:/storage
    stop_grace_period: 2m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://${PROXMOX_VM_IP:-172.30.0.2}:8006/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 5m

  proxmox-config:
    build: .
    image: proxmox-config:latest
    network_mode: "service:proxmox"
    env_file:
      # Layer 1: Base credentials (Cloudflare, domain settings, etc.)
      - ./.env
      # Layer 2: Test-specific overrides (Proxmox connection, API tokens)
      - ./test/.env
    volumes:
      # Mount main config directory as base
      - ./config:/app/config:ro
      # Override with test-specific configs
      - ./test/config/proxmox.yaml:/app/config/proxmox.yaml:ro
      - ./templates:/app/templates:ro
      - ./data:/app/data
    depends_on:
      proxmox:
        condition: service_healthy

volumes:
  proxmox-storage:
    name: proxmox-test-storage
